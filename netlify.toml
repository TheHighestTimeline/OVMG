import { useStore } from "../store";
import { Badge } from "../components/ui";

/**
 * Global directory built from the standard vendor template + a usage count of
 * how many active boxes each vendor appears on. This is the "we already have
 * the infrastructure for vendors set up" master list.
 */
export default function VendorDirectory() {
  const { projects } = useStore();

  // de-dupe vendors by name across all projects, count usage
  const map = new Map<string, { name: string; scope: string; contractNo: string; contact: string; email: string; location: string; boxes: string[] }>();
  for (const p of projects) {
    for (const v of p.vendors) {
      const key = v.name;
      const entry = map.get(key) ?? { name: v.name, scope: v.scope, contractNo: v.contractNo, contact: v.contactName, email: v.contactEmail, location: v.location, boxes: [] };
      entry.boxes.push(p.id);
      map.set(key, entry);
    }
  }
  const vendors = [...map.values()].sort((a, b) => a.scope.localeCompare(b.scope));

  return (
    <>
      <div className="topbar"><div><h1>Vendor Directory</h1><span className="muted">{vendors.length} contracted vendors across the program</span></div></div>
      <div className="content">
        <div className="banner">These are the contracted suppliers, manufacturers, integrators, and installers that auto-populate every new box. Counts show how many boxes each is currently engaged on.</div>
        <div className="panel">
          <div className="table-wrap">
            <table>
              <thead><tr><th>Vendor</th><th>Scope</th><th>Contract #</th><th>Contact</th><th>Location</th><th>Boxes</th></tr></thead>
              <tbody>
                {vendors.map((v) => (
                  <tr key={v.name}>
                    <td><b>{v.name}</b></td>
                    <td><Badge color="purple">{v.scope}</Badge></td>
                    <td className="muted">{v.contractNo}</td>
                    <td>{v.contact}<br /><span className="muted" style={{ fontSize: 12 }}>{v.email}</span></td>
                    <td>{v.location}</td>
                    <td><Badge color="blue">{v.boxes.length}</Badge></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </>
  );
}
