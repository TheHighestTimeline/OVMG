<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneVibe Internal Hub</title>
    <meta name="description" content="OneVibe Media Group internal dashboard" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◐</text></svg>" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { font-family: 'Geist', system-ui, sans-serif; background: #fbf8f2; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-thumb { background: #ddd3bb; border-radius: 999px; }
      /* Clerk modal z-index fix */
      .cl-rootBox { z-index: 9999; }

      /* ── Dark mode ──────────────────────────────────────────────────────────
         A real dark theme: the JS palette (src/constants.js) swaps its tokens to
         dark values and the React root re-renders. This rule only sets the
         pre-paint page background so there's no light flash before React mounts;
         scrollbar tuned to match. No invert filter (which previously flipped
         every color instead of theming). */
      html.ovmg-dark, html.ovmg-dark body { background: #0e1014; }
      html.ovmg-dark ::-webkit-scrollbar-thumb { background: #3a434f; }
    </style>
    <script>
      /* Apply saved theme before first paint to avoid a light flash. */
      try { if (localStorage.getItem('ovmg.theme') === 'dark') document.documentElement.classList.add('ovmg-dark'); } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
